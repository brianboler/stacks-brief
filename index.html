:root {
  --field-night: #0E1B12;
  --chalk:       #F2EFE6;
  --amber:       #FFB524;
  --clay:        #9A5B3C;
  --dugout:      #182A1D;
  --font-display: 'Barlow Condensed', system-ui, sans-serif;
  --font-mono:    'IBM Plex Mono', ui-monospace, monospace;
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0; background: var(--field-night); color: var(--chalk);
  font-family: var(--font-mono);
  display: grid; place-items: center; padding: 1.5rem;
  /* A single soft pool of light, as if under a field lamp. */
  background-image: radial-gradient(ellipse 60% 45% at 50% 38%, #16281B 0%, #0E1B12 70%);
}
.gate { width: min(24rem, 100%); text-align: center; }
.holo {
  width: 96px; height: 96px; margin: 0 auto .875rem;
  border-radius: 50%;
  filter: drop-shadow(0 0 22px rgba(154, 163, 178, .35));
}
@media (prefers-reduced-motion: no-preference) {
  .holo { animation: holo-spin 48s linear infinite; }
  @keyframes holo-spin { to { transform: rotate(360deg); } }
}
.mark { width: 34px; height: 34px; opacity: .8; margin: 0 auto; }
.eyebrow {
  font-size: .6875rem; letter-spacing: .2em; text-transform: uppercase;
  color: var(--amber); margin: 1.5rem 0 0;
}
h1 {
  font-family: var(--font-display); font-weight: 600;
  font-size: clamp(2.25rem, 9vw, 3rem); line-height: .95;
  letter-spacing: .01em; text-transform: uppercase;
  margin: .5rem 0 0; text-wrap: balance;
}
.sub {
  font-size: .75rem; letter-spacing: .06em; color: #8C9487;
  margin: .875rem 0 0; line-height: 1.6;
}
form { margin: 2.25rem 0 0; display: flex; flex-direction: column; gap: .625rem; }
label {
  font-size: .625rem; letter-spacing: .18em; text-transform: uppercase;
  color: #8C9487; text-align: left;
}
input {
  font: inherit; font-size: 1rem; letter-spacing: .35em; text-align: center;
  color: var(--chalk); background: var(--dugout);
  border: 1px solid #2C4231; border-radius: 2px;
  padding: .8125rem .875rem;
}
input:focus { outline: 2px solid var(--amber); outline-offset: 2px; border-color: transparent; }
button {
  font: inherit; font-size: .75rem; letter-spacing: .14em; text-transform: uppercase;
  color: var(--field-night); background: var(--amber);
  border: 1px solid var(--amber); border-radius: 2px;
  padding: .8125rem 1rem; cursor: pointer;
}
button:hover:not(:disabled) { background: #FFC64F; border-color: #FFC64F; }
button:disabled { opacity: .55; cursor: progress; }
button:focus-visible { outline: 2px solid var(--chalk); outline-offset: 2px; }
.msg {
  min-height: 1.25rem; font-size: .6875rem; letter-spacing: .08em;
  margin: .25rem 0 0; color: #8C9487;
}
.msg[data-state="error"] { color: #E0865F; }
.msg[data-state="busy"]  { color: var(--amber); }
.foot {
  margin: 2.5rem 0 0; font-size: .625rem; letter-spacing: .1em;
  color: #5C6659; line-height: 1.8;
}
@media (prefers-reduced-motion: no-preference) {
  .gate { animation: rise .5s cubic-bezier(.22,1,.36,1) both; }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } }
}
</style>
</head>

    <h1>Build Plan</h1>
    <p class="sub">Prepared for 1845 by Brian Boler · July 2026</p>

    <form id="gate" autocomplete="off">
      <label for="pw">Password</label>
      <input id="pw" name="pw" type="password" inputmode="numeric"
             autocomplete="off" autocapitalize="off" spellcheck="false" required>
      <button id="go" type="submit">View the plan</button>
    </form>
    <p class="msg" id="msg" role="status" aria-live="polite"></p>

    <p class="foot">Confidential.<br>Not for redistribution.</p>
  </main>

<script>
(function () {
  var form = document.getElementById('gate');
  var pw   = document.getElementById('pw');
  var go   = document.getElementById('go');
  var msg  = document.getElementById('msg');

  function say(text, state) {
    msg.textContent = text;
    if (state) { msg.setAttribute('data-state', state); }
    else { msg.removeAttribute('data-state'); }
  }

  function b64(s) {
    var raw = atob(s), out = new Uint8Array(raw.length);
    for (var i = 0; i < raw.length; i++) { out[i] = raw.charCodeAt(i); }
    return out;
  }

  var cached = null;
  function payload() {
    if (!cached) {
      cached = fetch('payload.json').then(function (r) {
        if (!r.ok) { throw new Error('payload ' + r.status); }
        return r.json();
      });
    }
    return cached;
  }

  // Warm the fetch on first keystroke so submitting feels instant.
  pw.addEventListener('input', function once() {
    pw.removeEventListener('input', once);
    payload().catch(function () { cached = null; });
  });

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    if (!window.crypto || !crypto.subtle) {
      say('This browser cannot decrypt the page. Try Chrome, Safari or Firefox over https.', 'error');
      return;
    }
    go.disabled = true;
    say('Decrypting…', 'busy');

    payload().then(function (p) {
      var enc = new TextEncoder().encode(pw.value);
      return crypto.subtle.importKey('raw', enc, 'PBKDF2', false, ['deriveKey'])
        .then(function (base) {
          return crypto.subtle.deriveKey(
            { name: 'PBKDF2', salt: b64(p.salt), iterations: p.iters, hash: 'SHA-256' },
            base, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
        })
        .then(function (key) {
          return crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64(p.iv) }, key, b64(p.ct));
        });
    }).then(function (buf) {
      var html = new TextDecoder().decode(buf);
      // Replacing the whole document is what lets the deck's own <style> and
      // scroll engine run exactly as they do in the standalone file.
      document.open();
      document.write(html);
      document.close();
    }).catch(function (err) {
      go.disabled = false;
      if (err && /payload/.test(err.message)) {
        say('Could not load the page data. Refresh and try again.', 'error');
      } else {
        say('That password is not right.', 'error');
      }
      pw.value = '';
      pw.focus();
    });
  });

  pw.focus();
})();
</script>
